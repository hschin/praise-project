<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Background with gradient -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B5A3C;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6B4423;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Rounded square background -->
  <rect width="100" height="100" rx="20" fill="url(#bg)"/>
  
  <!-- Simple stylized "P" made from a music note -->
  <!-- Vertical stem -->
  <rect x="35" y="25" width="8" height="50" rx="4" fill="#F5E6D3"/>
  
  <!-- Note head (circular, bigger) - positioned to the right of stem for P shape -->
  <circle cx="50" cy="35" r="18" fill="#F5E6D3"/>
  
  <!-- Inner circle to create a hollow effect -->
  <circle cx="50" cy="35" r="10" fill="#6B4423"/>
</svg>
