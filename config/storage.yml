test:
  service: Disk
  root: <%= Rails.root.join("tmp/storage") %>

local:
  service: Disk
  root: <%= Rails.root.join("storage") %>

# AWS S3 — used in production via ECS task role (no hardcoded credentials needed;
# the IAM task role grants s3:GetObject/PutObject/DeleteObject on the bucket).
amazon:
  service: S3
  region: <%= ENV.fetch("AWS_REGION", "ap-southeast-1") %>
  bucket: <%= ENV.fetch("S3_BUCKET", "") %>

# Remember not to checkin your GCS keyfile to a repository
# google:
