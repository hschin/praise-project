    hero_badge: AI-powered worship tools
    hero_headline_1: Worship slides,
    hero_headline_2: ready in minutes.
    hero_body: Import Chinese worship songs with AI, arrange your service deck, and export a projection-ready PowerPoint — complete with pinyin — in one click.
